<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secondary Footer Overlay Host</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }

    body {
      position: relative;
      pointer-events: none;
      background: transparent;
    }

    .overlay-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .overlay-text {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.1);
      max-width: 100%;
    }

    .overlay-runner {
      position: absolute;
      top: 50%;
      left: 0;
      transform: translate(0, -50%);
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      will-change: transform, opacity;
    }

    .overlay-image {
      display: block;
      width: auto;
      max-width: none;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="overlay-layer" id="overlayLayer"></div>

  <script src="assets/bdn-identity.js"></script>
  <script src="assets/bdn-content-paths.js"></script>
  <script>
    const DATA_URL = "data/footer.json";
    const STORAGE_KEY = "bdn_next_footer_state_v1";

    const DEFAULT_OVERLAY_BASE = {
      enabled: false,
      type: "none",
      animation: "scroll",
      delaySeconds: 8,
      repeatMinutes: 2,
      direction: "rtl",
      travelSeconds: 8,
      centerPauseSeconds: 2,
      screenTimeSeconds: 4,
      fadeSeconds: 3,
      text: "",
      fontFamily: "Impact",
      fontSizePx: 44,
      fontWeight: 700,
      letterSpacingEm: 0.03,
      textColor: "#fff1dc",
      textBackgroundEnabled: false,
      textBackgroundColor: "#102033",
      imagePath: "assets/footer/ghost-comet.svg",
      imageStyle: "ghost",
      imageHeightPx: 56,
      imageOpacity: 0.42
    };

    const DEFAULT_STATE = {
      overlays: [
        { ...DEFAULT_OVERLAY_BASE, enabled: false, type: "none", delaySeconds: 0 },
        { ...DEFAULT_OVERLAY_BASE, enabled: false, type: "text", direction: "ltr", delaySeconds: 10, text: "Region message placeholder" },
        { ...DEFAULT_OVERLAY_BASE, enabled: false, type: "image", delaySeconds: 6, imagePath: "assets/footer/solid-banner.svg", imageStyle: "solid", imageHeightPx: 52, imageOpacity: 1 }
      ]
    };

    const overlayLayerEl = document.getElementById("overlayLayer");
    let state = structuredClone(DEFAULT_STATE);
    let anchorIntervalId = null;
    let pendingTimers = [];
    let activeOverlayTokens = [0, 0, 0];
    let overlayActiveFlags = [false, false, false];

    function clampNumber(value, min, max, fallback) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return fallback;
      return Math.min(max, Math.max(min, numeric));
    }

    function normalizeOverlay(rawOverlay, index) {
      const defaults = DEFAULT_STATE.overlays[index] || DEFAULT_OVERLAY_BASE;
      const next = { ...DEFAULT_OVERLAY_BASE, ...defaults, ...(rawOverlay || {}) };
      if (next.type === "scroll-text") next.type = "text";
      if (next.type === "scroll-image") next.type = "image";
      next.enabled = Boolean(next.enabled);
      next.type = ["none", "text", "image"].includes(next.type) ? next.type : defaults.type;
      next.animation = ["scroll", "fade"].includes(next.animation) ? next.animation : defaults.animation;
      next.delaySeconds = clampNumber(next.delaySeconds, 0, 600, defaults.delaySeconds);
      next.repeatMinutes = clampNumber(next.repeatMinutes, 0.1, 720, defaults.repeatMinutes);
      next.direction = ["rtl", "ltr"].includes(next.direction) ? next.direction : defaults.direction;
      next.travelSeconds = clampNumber(next.travelSeconds, 1, 120, defaults.travelSeconds);
      next.centerPauseSeconds = clampNumber(next.centerPauseSeconds, 0, 120, defaults.centerPauseSeconds);
      next.screenTimeSeconds = clampNumber(next.screenTimeSeconds, 0, 300, defaults.screenTimeSeconds);
      next.fadeSeconds = clampNumber(next.fadeSeconds, 0, 120, defaults.fadeSeconds);
      next.text = String(next.text || defaults.text);
      next.fontFamily = String(next.fontFamily || defaults.fontFamily);
      next.fontSizePx = clampNumber(next.fontSizePx, 16, 96, defaults.fontSizePx);
      next.fontWeight = clampNumber(next.fontWeight, 400, 800, defaults.fontWeight);
      next.letterSpacingEm = clampNumber(next.letterSpacingEm, 0, 0.4, defaults.letterSpacingEm);
      next.textColor = String(next.textColor || defaults.textColor);
      next.textBackgroundEnabled = Boolean(next.textBackgroundEnabled);
      next.textBackgroundColor = String(next.textBackgroundColor || defaults.textBackgroundColor);
      next.imagePath = String(next.imagePath || defaults.imagePath);
      next.imageStyle = ["ghost", "solid"].includes(next.imageStyle) ? next.imageStyle : defaults.imageStyle;
      next.imageHeightPx = clampNumber(next.imageHeightPx, 20, 220, defaults.imageHeightPx);
      next.imageOpacity = clampNumber(next.imageOpacity, 0.05, 1, defaults.imageOpacity);
      return next;
    }

    function normalizeState(raw) {
      const next = { ...DEFAULT_STATE, ...(raw || {}) };
      const overlaySource = Array.isArray(next.overlays) ? next.overlays : [];
      next.overlays = Array.from({ length: 3 }, (_, index) => normalizeOverlay(overlaySource[index], index));
      return next;
    }

    async function loadState() {
      let fileState = {};
      try {
        const result = await window.beaconContentPaths.fetchFirstJson(DATA_URL, { cache: "no-store" });
        fileState = result.json;
      } catch {}

      let localState = {};
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) localState = JSON.parse(stored);
      } catch {}

      state = normalizeState({ ...fileState, ...localState });
    }

    function stopOverlaySchedulers() {
      if (anchorIntervalId) {
        clearInterval(anchorIntervalId);
        anchorIntervalId = null;
      }
      pendingTimers.forEach((id) => clearTimeout(id));
      pendingTimers = [];
    }

    function stopActiveOverlays() {
      activeOverlayTokens = activeOverlayTokens.map((value) => value + 1);
      overlayActiveFlags = [false, false, false];
      overlayLayerEl.replaceChildren();
    }

    function buildOverlayTextNode(overlay) {
      const node = document.createElement("div");
      node.className = "overlay-text";
      node.textContent = overlay.text;
      node.style.fontFamily = `"${overlay.fontFamily}", Arial, sans-serif`;
      node.style.fontSize = `${overlay.fontSizePx}px`;
      node.style.fontWeight = String(overlay.fontWeight);
      node.style.letterSpacing = `${overlay.letterSpacingEm}em`;
      node.style.color = overlay.textColor;
      if (overlay.textBackgroundEnabled) {
        node.style.background = overlay.textBackgroundColor;
        node.style.padding = "0.26em 0.62em";
        node.style.borderRadius = "0.5em";
        node.style.boxShadow = "0 10px 22px rgba(0, 0, 0, 0.24)";
      }
      return node;
    }

    function buildOverlayImageNode(overlay) {
      const img = document.createElement("img");
      img.className = "overlay-image";
      img.alt = "";
      img.draggable = false;
      img.src = overlay.imagePath;
      img.style.height = `${overlay.imageHeightPx}px`;
      img.style.opacity = overlay.imageStyle === "ghost" ? String(overlay.imageOpacity) : "1";
      img.style.filter = overlay.imageStyle === "ghost"
        ? "drop-shadow(0 0 18px rgba(182, 229, 255, 0.18))"
        : "drop-shadow(0 0 12px rgba(255, 177, 110, 0.22))";
      return img;
    }

    function buildOverlayNode(overlay) {
      if (overlay.type === "text") return buildOverlayTextNode(overlay);
      if (overlay.type === "image") return buildOverlayImageNode(overlay);
      return null;
    }

    function waitForImages(node) {
      const images = Array.from(node.querySelectorAll("img"));
      if (!images.length) return Promise.resolve();
      return Promise.all(images.map((img) => {
        if (img.complete) return Promise.resolve();
        return new Promise((resolve) => {
          img.addEventListener("load", resolve, { once: true });
          img.addEventListener("error", resolve, { once: true });
        });
      }));
    }

    function scheduleTimeout(fn, delayMs) {
      const timerId = setTimeout(() => {
        pendingTimers = pendingTimers.filter((id) => id !== timerId);
        fn();
      }, delayMs);
      pendingTimers.push(timerId);
    }

    function launchOverlay(slotIndex) {
      const overlay = state.overlays[slotIndex];
      if (!overlay.enabled || overlay.type === "none") return;
      if (overlayActiveFlags[slotIndex]) return;
      overlayActiveFlags[slotIndex] = true;
      activeOverlayTokens[slotIndex] += 1;
      const token = activeOverlayTokens[slotIndex];
      const runner = document.createElement("div");
      runner.className = "overlay-runner";
      runner.style.zIndex = String(10 + slotIndex);
      const content = buildOverlayNode(overlay);
      if (!content) {
        overlayActiveFlags[slotIndex] = false;
        return;
      }
      runner.appendChild(content);
      overlayLayerEl.appendChild(runner);

      waitForImages(runner).then(() => {
        if (token !== activeOverlayTokens[slotIndex]) return;
        const startTime = performance.now();

        if (overlay.animation === "fade") {
          const totalDurationMs = (overlay.screenTimeSeconds * 1000) + (overlay.fadeSeconds * 2000);
          const fadeDurationMs = overlay.fadeSeconds * 1000;
          const holdStartMs = fadeDurationMs;
          const holdEndMs = fadeDurationMs + (overlay.screenTimeSeconds * 1000);
          const viewportWidth = overlayLayerEl.clientWidth || window.innerWidth || 1;
          const runnerWidth = Math.max(runner.offsetWidth, 1);
          const centerX = (viewportWidth - runnerWidth) / 2;
          runner.style.transform = `translate(${centerX}px, -50%)`;

          function frame(now) {
            if (token !== activeOverlayTokens[slotIndex]) return;
            const elapsed = now - startTime;
            let opacity = 1;
            if (fadeDurationMs > 0 && elapsed < holdStartMs) opacity = elapsed / fadeDurationMs;
            else if (fadeDurationMs > 0 && elapsed > holdEndMs) opacity = Math.max(0, 1 - ((elapsed - holdEndMs) / fadeDurationMs));
            runner.style.opacity = String(Math.min(1, Math.max(0, opacity)));
            if (elapsed >= totalDurationMs) {
              overlayActiveFlags[slotIndex] = false;
              runner.remove();
              return;
            }
            requestAnimationFrame(frame);
          }

          runner.style.opacity = "0";
          requestAnimationFrame(frame);
          return;
        }

        const viewportWidth = overlayLayerEl.clientWidth || window.innerWidth || 1;
        const runnerWidth = Math.max(runner.offsetWidth, 1);
        const startX = overlay.direction === "rtl" ? viewportWidth : -runnerWidth;
        const centerX = (viewportWidth - runnerWidth) / 2;
        const endX = overlay.direction === "rtl" ? -runnerWidth : viewportWidth;
        const moveDurationMs = overlay.travelSeconds * 1000;
        const segmentDurationMs = moveDurationMs / 2;
        const pauseDurationMs = overlay.centerPauseSeconds * 1000;
        const totalDurationMs = moveDurationMs + pauseDurationMs;

        function frame(now) {
          if (token !== activeOverlayTokens[slotIndex]) return;
          const elapsed = now - startTime;
          let x = endX;
          if (elapsed <= segmentDurationMs) {
            const progressIn = segmentDurationMs <= 0 ? 1 : elapsed / segmentDurationMs;
            x = startX + ((centerX - startX) * progressIn);
          } else if (elapsed <= segmentDurationMs + pauseDurationMs) {
            x = centerX;
          } else if (elapsed <= totalDurationMs) {
            const progressOut = segmentDurationMs <= 0 ? 1 : (elapsed - segmentDurationMs - pauseDurationMs) / segmentDurationMs;
            x = centerX + ((endX - centerX) * progressOut);
          }
          runner.style.transform = `translate(${x}px, -50%)`;
          if (elapsed >= totalDurationMs) {
            overlayActiveFlags[slotIndex] = false;
            runner.remove();
            return;
          }
          requestAnimationFrame(frame);
        }

        runner.style.transform = `translate(${startX}px, -50%)`;
        requestAnimationFrame(frame);
      });
    }

    function runOverlayCycle() {
      launchOverlay(0);
      scheduleTimeout(() => launchOverlay(1), state.overlays[1].delaySeconds * 1000);
      scheduleTimeout(() => launchOverlay(2), (state.overlays[1].delaySeconds + state.overlays[2].delaySeconds) * 1000);
    }

    function startOverlaySchedulers() {
      stopOverlaySchedulers();
      stopActiveOverlays();
      runOverlayCycle();
      anchorIntervalId = setInterval(runOverlayCycle, state.overlays[0].repeatMinutes * 60 * 1000);
    }

    async function renderAll() {
      await loadState();
      startOverlaySchedulers();
    }

    window.addEventListener("storage", (event) => {
      if (event.key === STORAGE_KEY) renderAll();
    });

    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data) return;
      if (data.type === "beacon-overlay-refresh" || data.type === "demo-overlay-refresh") {
        renderAll();
      }
    });

    window.addEventListener("beforeunload", () => {
      stopOverlaySchedulers();
      stopActiveOverlays();
    });

    renderAll();
  </script>
</body>
</html>
